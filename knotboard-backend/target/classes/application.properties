spring.application.name=knotboard-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/knotboard_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Pranesh77@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=knotboard_secret_key_for_jwt_signing_must_be_long_enough_256bits
jwt.expiration=86400000
